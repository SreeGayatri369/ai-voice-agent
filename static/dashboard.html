<!doctype html>
<html>
  <head>
    <title>Kanban Dashboard</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="top-bar">
      <h2>🧠 AI Support</h2>
      <input
        id="searchBox"
        placeholder="Search tickets..."
        onkeyup="searchTickets()"
      />
    </div>

    <div class="board">
      <div class="column" id="ACTIVE">
        <h3>ACTIVE</h3>
      </div>

      <div class="column" id="IN_PROGRESS">
        <h3>IN PROGRESS</h3>
      </div>

      <div class="column" id="COMPLETED">
        <h3>COMPLETED</h3>
      </div>
    </div>

    <!-- ✅ FIXED MODAL -->
    <div id="modal" class="modal">
      <div class="modal-box">
        <div class="modal-header">
          <h3>Conversation</h3>
          <span onclick="closeModal()">✖</span>
        </div>
        <div id="conversation"></div>
      </div>
    </div>

    <script src="/static/dashboard.js"></script>
  </body>
</html>
